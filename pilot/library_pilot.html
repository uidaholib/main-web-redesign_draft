<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>University of Idaho Library — Interactive Map</title>
<style>
  :root {
    --pride-gold: #F1B300;
    --steel: #323232;
    --raspberry: #D7003F;
    --lupine: #5E48FF;
    --clearwater: #008080;
    --leather: #AB4700;
    --huckleberry: #261882;
    --bg: #fafaf7;
    --ink: #191919;
    --muted: #6a6a6a;
    --rule: #e3e3dc;
    --panel: #ffffff;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Public Sans', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }

  /* === Layout === */
  .app {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: 100vh;
    max-width: 1500px;
    margin: 0 auto;
  }
  .map-pane {
    position: relative;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  .side-pane {
    border-left: 1px solid var(--rule);
    background: var(--panel);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* === Floor tabs (top of map area) === */
  .floor-tabs {
    display: flex;
    gap: 2px;
    padding: 16px 20px 0;
    background: var(--bg);
  }
  .floor-tabs button {
    background: #ebe9e0;
    border: 1px solid transparent;
    border-bottom: none;
    padding: 10px 18px;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    transition: background 0.15s, color 0.15s;
  }
  .floor-tabs button:hover { color: var(--ink); }
  .floor-tabs button.is-active {
    background: var(--panel);
    color: var(--ink);
    border-color: var(--rule);
    border-bottom: 1px solid var(--panel);
    margin-bottom: -1px;
    z-index: 2;
  }

  /* === SVG container === */
  .svg-wrap {
    flex: 1;
    overflow: hidden;
    padding: 0 20px 20px;
    border-top: 1px solid var(--rule);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .svg-wrap svg {
    width: 100%;
    height: 100%;
    max-height: 100%;
  }

  /* The SVG's built-in Color Key is hidden — we render our own in the side panel 
  .svg-wrap svg #Color_Key { display: none; }*/

  /* Text labels sit on top of rooms — let clicks fall through */
  .svg-wrap svg #text text,
  .svg-wrap svg #text tspan,
  .svg-wrap svg [id$="-text"],
  .svg-wrap svg [id$="_text"],
  .svg-wrap svg #floor_xA0_vector,
  .svg-wrap svg #floorvector,
  .svg-wrap svg #RestroomIcons,
  .svg-wrap svg #FishbowlRestroomIcons,
  .svg-wrap svg #Title,
  .svg-wrap svg #Subtitle {
    pointer-events: none;
  }

  /* === Interactive room styling === */
  .room {
    cursor: pointer;
    transition: filter 0.15s ease, opacity 0.15s ease;
  }
  .room:hover { filter: brightness(1.15); }
  .room.is-selected {
    outline: 3px solid var(--ink);
    outline-offset: 1px;
  }
  .map-pane.has-selection .room:not(.is-selected) {
    opacity: 0.45;
  }

  /* Tour pins */
  .tour-pin {
    cursor: pointer;
    transition: transform 0.2s ease;
    transform-origin: center;
    transform-box: fill-box;
  }
  .tour-pin:hover { transform: scale(1.15); }
  .tour-pin circle {
    fill: var(--pride-gold);
    stroke: var(--ink);
    stroke-width: 1.2;
  }
  .tour-pin text {
    font-weight: 800;
    font-size: 11px;
    fill: var(--ink);
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }
  .tour-pin.is-active circle { fill: var(--raspberry); }
  .tour-pin.is-active text { fill: white; }

  /* === Tooltip === */
  .tooltip {
    position: fixed;
    background: var(--ink);
    color: white;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .tooltip.is-visible { opacity: 1; }

  /* === Side pane === */
  .side-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--rule);
  }
  .side-header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 800;
  }
  .side-header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }

  .modes {
    display: flex;
    border-bottom: 1px solid var(--rule);
    background: #f4f4ee;
  }
  .modes button {
    flex: 1;
    background: none;
    border: none;
    padding: 12px 8px;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .modes button.is-active {
    color: var(--ink);
    border-bottom-color: var(--pride-gold);
    background: var(--panel);
  }
  .modes button:hover:not(.is-active) { color: var(--ink); }

  /* Search */
  .search-wrap {
    padding: 16px 24px;
    border-bottom: 1px solid var(--rule);
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 12px;
    font: inherit;
    font-size: 14px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: white;
  }
  .search-wrap input:focus {
    outline: 2px solid var(--pride-gold);
    outline-offset: -1px;
    border-color: var(--pride-gold);
  }

  /* Room list */
  .room-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .room-list .group-label {
    padding: 12px 24px 4px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .room-list button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 8px 24px;
    font: inherit;
    font-size: 14px;
    cursor: pointer;
    color: var(--ink);
    border-left: 3px solid transparent;
  }
  .room-list button:hover { background: #f7f5ed; }
  .room-list button.is-selected {
    background: #fef6dc;
    border-left-color: var(--pride-gold);
    font-weight: 600;
  }
  .room-list .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* Detail */
  .detail {
    padding: 20px 24px 32px;
    overflow-y: auto;
    flex: 1;
  }
  .detail .zone-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: white;
    margin-bottom: 12px;
  }
  .detail h2 {
    margin: 0 0 12px;
    font-size: 24px;
    font-weight: 800;
    line-height: 1.2;
  }
  .detail p {
    margin: 0 0 12px;
    font-size: 15px;
    color: #2a2a2a;
  }
  .detail .empty {
    color: var(--muted);
    font-style: italic;
    font-size: 14px;
  }
  .back-button {
    background: none;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 6px 12px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .back-button:hover { background: #f7f5ed; }

  /* Tour panel */
  .tour-panel {
    padding: 20px 24px 32px;
    overflow-y: auto;
    flex: 1;
  }
  .tour-panel .tour-step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--pride-gold);
    color: var(--ink);
    font-weight: 800;
    font-size: 14px;
    margin-right: 10px;
  }
  .tour-controls {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .tour-controls button {
    flex: 1;
    padding: 10px;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .tour-controls button:disabled {
    background: #c0c0bd;
    cursor: not-allowed;
  }
  .tour-controls button.secondary {
    background: white;
    color: var(--ink);
    border: 1px solid var(--rule);
  }
  .progress {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Zone tag colors */
  .zone-resources { background: var(--clearwater); }
  .zone-collab { background: var(--lupine); }
  .zone-service { background: var(--pride-gold); color: var(--ink); }
  .zone-restrooms { background: var(--leather); }
  .zone-nonpublic { background: #6a6a6a; }
  .zone-individual { background: var(--raspberry); }
  .zone-books { background: #034441; }
  .zone-periodicals { background: #6a6a6a; }
  .zone-study { background: var(--raspberry); }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 60vh 1fr; }
    .side-pane { border-left: none; border-top: 1px solid var(--rule); }
  }
</style>
</head>
<body>

<div class="app">
  <div class="map-pane" id="mapPane">
    <nav class="floor-tabs" id="floorTabs">
      <button data-floor="1" class="is-active">First Floor</button>
      <button data-floor="2">Second Floor</button>
    </nav>
    <div class="svg-wrap" id="svgWrap"></div>
  </div>

  <aside class="side-pane">
    <header class="side-header">
      <h1 id="floorTitle">First Floor</h1>
      <p id="floorSubtitle">Circulation, Genre Cubbies, Special Collections, and The Mill</p>
    </header>

    <nav class="modes">
      <button data-mode="browse" class="is-active">Browse</button>
      <button data-mode="tour">Take a Tour</button>
    </nav>

    <div id="browseView">
      <div class="search-wrap">
        <input type="search" id="search" placeholder="Search for a room or service…">
      </div>
      <div class="room-list" id="roomList"></div>
    </div>

    <div class="detail" id="detailView" hidden></div>
    <div class="tour-panel" id="tourView" hidden></div>
  </aside>
</div>

<div class="tooltip" id="tooltip"></div>

// ============================================================
// STATE
// ============================================================
const state = {
  floor: 1,
  mode: 'browse',
  selectedRoomId: null,
  tourStep: 0
};

function currentFloor() { return FLOORS[state.floor]; }

// ============================================================
// SVG MOUNTING
// ============================================================
function mountFloor(floorNum) {
  state.floor = floorNum;
  state.selectedRoomId = null;
  state.tourStep = 0;

  // Pull SVG markup from store and mount
  const stored = document.querySelector(`#svgStore [data-floor="${floorNum}"]`);
  document.getElementById('svgWrap').innerHTML = stored.innerHTML;

  // Update header
  const f = currentFloor();
  document.getElementById('floorTitle').textContent = f.title;
  document.getElementById('floorSubtitle').textContent = f.subtitle;

  // Update tab active state
  document.querySelectorAll('#floorTabs button').forEach(btn => {
    btn.classList.toggle('is-active', Number(btn.dataset.floor) === floorNum);
  });

  // Reset map highlight state
  document.getElementById('mapPane').classList.remove('has-selection');

  // Wire up rooms
  bindRoomInteractions();

  // Re-render side panel
  if (state.mode === 'browse') {
    document.getElementById('browseView').hidden = false;
    document.getElementById('detailView').hidden = true;
    document.getElementById('tourView').hidden = true;
    renderRoomList();
  } else {
    document.getElementById('browseView').hidden = true;
    document.getElementById('detailView').hidden = true;
    document.getElementById('tourView').hidden = false;
    renderTourView();
  }

  drawTourPins();
}

function bindRoomInteractions() {
  currentFloor().rooms.forEach(room => {
    const el = document.getElementById(room.svgId);
    if (!el) return;

    const targets = el.tagName === 'g'
      ? el.querySelectorAll('rect, polygon, ellipse, path, polyline')
      : [el];

    targets.forEach(t => {
      t.classList.add('room');
      t.dataset.roomId = room.id;

      t.addEventListener('mouseenter', e => showTooltip(e, room.name));
      t.addEventListener('mousemove', moveTooltip);
      t.addEventListener('mouseleave', hideTooltip);
      t.addEventListener('click', () => selectRoom(room.id));
    });
  });
}

// ============================================================
// TOOLTIP
// ============================================================
const tooltipEl = document.getElementById('tooltip');
function showTooltip(e, text) {
  tooltipEl.textContent = text;
  tooltipEl.classList.add('is-visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  tooltipEl.style.left = (e.clientX + 12) + 'px';
  tooltipEl.style.top = (e.clientY + 12) + 'px';
}
function hideTooltip() {
  tooltipEl.classList.remove('is-visible');
}

// ============================================================
// SELECTION
// ============================================================
function selectRoom(roomId) {
  state.selectedRoomId = roomId;

  document.querySelectorAll('.room.is-selected').forEach(el => el.classList.remove('is-selected'));

  const room = currentFloor().rooms.find(r => r.id === roomId);
  if (room) {
    const el = document.getElementById(room.svgId);
    if (el) {
      const targets = el.tagName === 'g'
        ? el.querySelectorAll('rect, polygon, ellipse, path, polyline')
        : [el];
      targets.forEach(t => t.classList.add('is-selected'));
    }
  }

  document.getElementById('mapPane').classList.toggle('has-selection', !!roomId);

  if (state.mode === 'browse') {
    showDetail(roomId);
  }
  updateRoomList();
}

function clearSelection() {
  state.selectedRoomId = null;
  document.querySelectorAll('.room.is-selected').forEach(el => el.classList.remove('is-selected'));
  document.getElementById('mapPane').classList.remove('has-selection');
  hideDetail();
  updateRoomList();
}

// ============================================================
// BROWSE: ROOM LIST + SEARCH
// ============================================================
function renderRoomList(filter = '') {
  const list = document.getElementById('roomList');
  const q = filter.trim().toLowerCase();
  const rooms = currentFloor().rooms;

  // Dedupe rooms with the same display name (e.g., the two "Restrooms" entries)
  const seen = new Set();
  const uniqueRooms = rooms.filter(r => {
    const key = r.name + '|' + r.zone;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  const matches = uniqueRooms.filter(r =>
    !q || r.name.toLowerCase().includes(q) || (r.blurb && r.blurb.toLowerCase().includes(q))
  );

  // Group by zone
  const byZone = {};
  matches.forEach(r => {
    if (!byZone[r.zone]) byZone[r.zone] = [];
    byZone[r.zone].push(r);
  });

  let html = '';
  if (matches.length === 0) {
    html = '<p style="padding:16px 24px;color:var(--muted);font-size:14px">No matches.</p>';
  } else {
    ['service', 'resources', 'books', 'periodicals', 'collab', 'individual', 'study', 'restrooms', 'nonpublic'].forEach(zoneKey => {
      if (!byZone[zoneKey]) return;
      html += `<div class="group-label">${ZONES[zoneKey].label}</div>`;
      byZone[zoneKey].forEach(r => {
        const sel = r.id === state.selectedRoomId ? 'is-selected' : '';
        html += `<button class="${sel}" data-room-id="${r.id}">
          <span class="swatch" style="background:${ZONES[r.zone].color}"></span>${r.name}
        </button>`;
      });
    });
  }

  list.innerHTML = html;
  list.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => selectRoom(btn.dataset.roomId));
  });
}

function updateRoomList() {
  const filter = document.getElementById('search').value;
  renderRoomList(filter);
}

document.getElementById('search').addEventListener('input', e => {
  renderRoomList(e.target.value);
});

  const room = currentFloor().rooms.find(r => r.id === roomId);
  if (!room) return;

  document.getElementById('browseView').hidden = true;
  document.getElementById('detailView').hidden = false;

  const zone = ZONES[room.zone];
  const detail = document.getElementById('detailView');
  detail.innerHTML = `
    <button class="back-button" id="backBtn">← Back to list</button>
    <span class="zone-tag zone-${room.zone}">${zone.label}</span>
    <h2>${room.name}</h2>
    ${room.blurb ? `<p>${room.blurb}</p>` : `<p class="empty">A space within the library. No detailed description available yet.</p>`}
  `;

  document.getElementById('backBtn').addEventListener('click', clearSelection);
}

function hideDetail() {
  document.getElementById('detailView').hidden = true;
  if (state.mode === 'browse') {
    document.getElementById('browseView').hidden = false;
  }
}

// ============================================================
// TOUR
// ============================================================
function drawTourPins() {
  const svg = document.querySelector('#svgWrap svg');
  if (!svg) return;

  svg.querySelectorAll('.tour-pin').forEach(p => p.remove());

  if (state.mode !== 'tour') return;

  const tour = currentFloor().tour;
  tour.forEach(({ stop, roomId }) => {
    const room = currentFloor().rooms.find(r => r.id === roomId);
    if (!room) return;
    const target = document.getElementById(room.svgId);
    if (!target) return;

    let bbox;
    try { bbox = target.getBBox(); } catch (e) { return; }
    const cx = bbox.x + bbox.width / 2;
    const cy = bbox.y + bbox.height / 2;

    const isActive = state.tourStep === stop;

    const pin = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    pin.classList.add('tour-pin');
    if (isActive) pin.classList.add('is-active');
    pin.dataset.tourStop = stop;
    pin.innerHTML = `
      <circle cx="${cx}" cy="${cy}" r="9"></circle>
      <text x="${cx}" y="${cy}">${stop}</text>
    `;
    pin.addEventListener('click', () => goToTourStop(stop));
    svg.appendChild(pin);
  });
}

function renderTourView() {
  const view = document.getElementById('tourView');
  const tour = currentFloor().tour;

  if (state.tourStep === 0) {
    view.innerHTML = `
      <h2 style="margin:0 0 12px;font-size:20px;font-weight:800">Welcome</h2>
      <p>This guided tour walks you through ${tour.length} key stops on the ${currentFloor().title.toLowerCase()}, drawn from the Library Virtual Tour.</p>
      <p>Click a numbered pin on the map, or use the controls below to step through.</p>
      <div class="tour-controls">
        <button id="tourStart">Start tour</button>
      </div>
    `;
    document.getElementById('tourStart').addEventListener('click', () => goToTourStop(1));
    return;
  }

  const tourEntry = tour.find(t => t.stop === state.tourStep);
  const room = currentFloor().rooms.find(r => r.id === tourEntry.roomId);
  const zone = ZONES[room.zone];

  view.innerHTML = `
    <p class="progress">Stop ${state.tourStep} of ${tour.length}</p>
    <span class="zone-tag zone-${room.zone}">${zone.label}</span>
    <h2><span class="tour-step-num">${state.tourStep}</span>${room.name}</h2>
    ${room.blurb ? `<p>${room.blurb}</p>` : ''}
    <div class="tour-controls">
      <button class="secondary" id="tourPrev" ${state.tourStep === 1 ? 'disabled' : ''}>← Previous</button>
      <button id="tourNext" ${state.tourStep === tour.length ? 'disabled' : ''}>Next →</button>
    </div>
    ${state.tourStep === tour.length
      ? '<p style="margin-top:16px;color:var(--muted);font-size:13px">You\u2019ve reached the end of this floor\u2019s tour. Switch floors to explore more.</p>'
      : ''}
  `;

  const prev = document.getElementById('tourPrev');
  const next = document.getElementById('tourNext');
  if (prev) prev.addEventListener('click', () => goToTourStop(state.tourStep - 1));
  if (next) next.addEventListener('click', () => goToTourStop(state.tourStep + 1));
}

function goToTourStop(n) {
  state.tourStep = n;
  if (n > 0) {
    const tourEntry = currentFloor().tour.find(t => t.stop === n);
    if (tourEntry) selectRoom(tourEntry.roomId);
  }
  drawTourPins();
  renderTourView();
}

// ============================================================
// MODE & FLOOR SWITCHING
// ============================================================
document.querySelectorAll('.modes button').forEach(btn => {
  btn.addEventListener('click', () => {
    const newMode = btn.dataset.mode;
    if (newMode === state.mode) return;
    state.mode = newMode;

    document.querySelectorAll('.modes button').forEach(b =>
      b.classList.toggle('is-active', b.dataset.mode === newMode));

    if (newMode === 'browse') {
      document.getElementById('tourView').hidden = true;
      document.getElementById('browseView').hidden = false;
      clearSelection();
    } else {
      document.getElementById('browseView').hidden = true;
      document.getElementById('detailView').hidden = true;
      document.getElementById('tourView').hidden = false;
      state.tourStep = 0;
      clearSelection();
      renderTourView();
    }
    drawTourPins();
  });
});

document.querySelectorAll('#floorTabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = Number(btn.dataset.floor);
    if (target === state.floor) return;
    mountFloor(target);
  });
});

// ============================================================
// INIT
// ============================================================
mountFloor(1);
</script>
</body>
</html>
